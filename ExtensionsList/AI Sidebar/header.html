<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Sidebar</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #121212;
    color: white;
  }

  .header {
    position: fixed;
    top: 0;
    width: 100%;
    height: 48px;
    min-height: 48px;
    max-height: 48px;
    overflow: hidden;
    background: rgba(20, 20, 30, 0.9);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.4);
  }

  .title {
    font-weight: bold;
    font-size: 14px;
  }

  select {
    height: 28px;
    background: #1e1e2f;
    color: white;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 0 10px;
    font-size: 13px;
    cursor: pointer;
  }

  select:focus {
    outline: none;
    border-color: #6c63ff;
  }

  option {
    background: #1e1e2f;
    color: white;
  }

  button {
    height: 28px;
    border: none;
    border-radius: 6px;
    background: #6c63ff;
    color: white;
    padding: 0 12px;
    font-size: 13px;
    cursor: pointer;
  }

  button:hover {
    background: #574fd6;
  }

  .spacer {
    height: 48px;
  }
</style>
</head>

<body>

<div class="header">
  <div class="title">AI Sidebar</div>

  <select id="aiDropdown">
    <option value="">Choose</option>
    <option value="https://chatgpt.com">ChatGPT</option>
    <option value="https://claude.ai">Claude</option>
    <option value="https://gemini.google.com">Gemini</option>
    <option value="https://copilot.microsoft.com">Copilot</option>
    <option value="https://chat.qwen.ai">Qwen</option>
    <option value="https://duck.ai">Duck.ai</option>
    <option value="https://venice.ai/chat">Venice</option>
    <option value="https://lumo.proton.me">Lumo</option>
  </select>

  <button onclick="openAI()">Go</button>
</div>

<div class="spacer"></div>

<script>
  function openAI() {
    const url = document.getElementById("aiDropdown").value;
    if (!url) return;
    window.open(url, "_blank");
  }
</script>

</body>
</html>
