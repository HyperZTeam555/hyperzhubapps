<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Extension</title>
  <style>
    body {
      margin: 0;
      width: 200px;
      height: 150px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 10px;
    }
    button {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      background: #007bff;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <h1>Extension Test</h1>
  <button id="btn">Click Me</button>

  <script>
    document.getElementById("btn").onclick = () => {
      alert("Extension is working!");
    };
  </script>
</body>
</html>
